        :root {

            --border: 1px solid rgba(220, 20, 60, 0.4);
            --highlight: #ff2400; /* Yellow for selection */            
        }

        body { 
            background-color: var(--bg-color); 
            color: beige; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            /* This line prevents browser double-tap zoom */
            touch-action: manipulation;
        }

        nav { width: 100%; padding: 20px; text-align: center; background: rgba(0,0,0,0.2); border-bottom: var(--border); margin-bottom: 20px; }
        nav a { color: var(--text-color); margin: 0 15px; text-decoration: none; cursor: pointer; font-weight: bold; }

        #app { 
            width: 90vw; max-width: 1000px; padding: 40px; margin-bottom: 40px; 
            background: var(--glass-bg); backdrop-filter: blur(15px); 
            border-radius: 30px; border: var(--border); position: relative;
        }

        #lesson-scoreboard { 
            text-align: right; color: var(--text-color); margin-bottom: 20px; font-weight: bold; 
            border-bottom: var(--border); padding-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center; 
        }

        h1 { color: var(--text-color); font-size: 2.2rem; margin-top: 0; }
        
        /* Media Containers */
        .media-container { width: 100%; margin: 20px 0; border-radius: 15px; overflow: hidden; border: var(--border); }
        .media-container iframe { width: 100%; height: 400px; display: block; }
        .media-container img { width: 100%; height: auto; display: block; }
        
        .discussion-box { padding: 20px; margin-bottom: 20px; cursor: pointer;}

        /* References Styling */
        .references-page-box { padding: 20px; background: rgba(0,0,0,0.2); border-radius: 15px; border-left: 4px solid var(--text-color); }
        #ref-list { list-style: square; padding-left: 20px; color: #eee; line-height: 1.8; }

        button { padding: 15px; background: rgba(255, 255, 255, 0.1); color: white; border: var(--border); border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover:not(:disabled) { background:  #ff6b6b; color: #2d0a1f; }
        button:disabled { opacity: 0.6; cursor: not-allowed; border: 1px solid #555; }
        
        button.selected { border: 2px solid var(--highlight); background: rgba(250, 204, 21, 0.2); }
        
        .btn-trigger { width: 100%; background: #5d4037; margin-top: 10px; }
        #questions-section { display: none; margin-top: 20px; }
        .question-block { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        
        footer { margin-top: auto; padding: 20px; opacity: 0.8; text-align: center; border-top: var(--border); width: 100%; background: rgba(0,0,0,0.2); }
    
    /* Modal Styling */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; top: 0;
    width: 100%; height: 100%; 
    background-color: rgba(0,0,0,0.8); /* Darken background */
    backdrop-filter: blur(5px);
}

.modal-content {
    background-color: #064e3b;
    margin: 5% auto;
    padding: 20px;
    border: var(--border);
    width: 80%;
    max-height: 80vh;
    overflow-y: auto; /* Scroll if many questions */
    border-radius: 20px;
}

.close-modal {
    color: var(--text-color);

    font-size: 28px;
    font-weight: bold;

                // --- TTS and Tap Logic ---
        
        function stripHtml(html) {
            return html.replace(/<[^>]*>/g, ' ');
        }

        // THE MISSING FUNCTION
        function playSpeech(text) {
            // 1. Cancel existing speech
            window.speechSynthesis.cancel();

            // 2. Handle object (en/fil) vs string
            let rawText = typeof text === 'object' ? text[currentLang] : text;
            
            // 3. Clean the text for TTS
            let cleanText = stripHtml(rawText)
                .replace(/\[.*?\]/g, '')        // Remove brackets
                .normalize("NFD")               // Fix hidden encoding
                .replace(/[\u0300-\u036f]/g, "") // Strip accents
                .replace(/\s+/g, ' ')           // Clean spaces
                .trim()
                .toLowerCase();                 // Prevent spelling out caps

            if (!cleanText) return;

            // 4. Setup Utterance
            const utterance = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();

            // 5. Voice Selection
            if (currentLang === 'fil') {
                const filVoice = voices.find(v => v.lang.includes('tl-PH') || v.lang.includes('fil-PH'));
                if (filVoice) utterance.voice = filVoice;
                utterance.lang = 'tl-PH';
                utterance.rate = 0.9;
            } else {
                const enVoice = voices.find(v => v.lang.includes('en-US'));
                if (enVoice) utterance.voice = enVoice;
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
            }

            // 6. Music Integration
            if (userWantsMusic && ytPlayer) {
                ytPlayer.pauseVideo();
            }

            // Resume music when done
            utterance.onend = () => {
                if (userWantsMusic && ytPlayer) ytPlayer.playVideo();
            };

            // 7. Speak with a tiny delay to ensure cancel() finished
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        function setLanguageAndRead(lang) {
            window.speechSynthesis.cancel();
            currentLang = lang;
            
            // Update the UI text
            const slide = sessionSlides[currentIndex];
            const textElement = document.getElementById('discussion-text');
            if (textElement) {
                textElement.innerText = typeof slide.discussion === 'object' ? slide.discussion[lang] : slide.discussion;
            }
            
            // Trigger speech
            playSpeech(slide.discussion);
        }

        function handleTap(text) {
            tapCount++;
            if (tapCount === 1) {
                tapTimer = setTimeout(() => {
                    if (window.speechSynthesis.paused) {
                        window.speechSynthesis.resume();
                    } else if (window.speechSynthesis.speaking) {
                        window.speechSynthesis.pause();
                    }
                    tapCount = 0;
                }, 300);
            } else {
                clearTimeout(tapTimer);
                playSpeech(text);
                tapCount = 0;
            }
        }

        // Initialize voices for Chrome/Mobile browsers
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        function renderQuestions() {
            const qContainer = document.getElementById('questions-section');
            const slide = sessionSlides[currentIndex];
            qContainer.innerHTML = '';
            slide.questions.forEach((q, qIndex) => {
                const optionsText = q.options.map((opt, i) => `Option ${i + 1}: ${opt.t}`).join('. ');
                 const fullSpeechText = `${q.q}. ${optionsText}`;
                qContainer.innerHTML += `
                    <div class="question-block">
                   <p onclick="playSpeech('${fullSpeechText.replace(/'/g, "\\'")}')" style="cursor: pointer;">
                    <strong>Q${qIndex + 1}:</strong> ${q.q} 
                    <span style="font-size: 0.8rem; color: #a3e635; display: block;">(Tap to hear question)</span>
                    </p>
                         
                        <div class="options-grid">
                            ${q.options.map((opt, optIndex) => `
                                <button class="${q.answered && q.selectedIndex === optIndex ? 'selected' : ''}" 
                                        ${q.answered ? 'disabled' : ''} 
                                        onclick="checkAnswer(${qIndex}, ${optIndex})">${opt.t}</button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function checkAnswer(qIdx, optIdx) {
            const slide = sessionSlides[currentIndex];
            const question = slide.questions[qIdx];
            question.answered = true;
            question.selectedIndex = optIdx;
            question.userCorrect = question.options[optIdx].c;
            alert(question.userCorrect ? "Correct!" : "Incorrect!");
            renderQuestions();
            updateScoreUI();
        }

        function calculateSectionScore() {
            const slide = sessionSlides[currentIndex];
            const correct = slide.questions.filter(q => q.userCorrect).length;
            return `${correct}/${slide.questions.length}`;
        }

        function calculateTotalScore() {
            let correct = 0; let total = 0;
            sessionSlides.forEach(s => s.questions.forEach(q => { total++; if(q.userCorrect) correct++; }));
            return `${correct}/${total}`;
        }

        function updateScoreUI() {
            const overall = document.getElementById('overall-score');
            const section = document.getElementById('section-score');
            if(overall) overall.innerText = calculateTotalScore();
            if(section) section.innerText = calculateSectionScore();
        }

}

// Automatically loops/plays the next track when the current one ends
function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        currentTrackIndex = (currentTrackIndex + 1) % musicPlaylist.length;
        ytPlayer.loadVideoById(musicPlaylist[currentTrackIndex]);
    }
}

// Toggle play/pause music manually via the button
function toggleBackgroundMusic() {
    if (!ytPlayer) return;
    
    const btn = document.getElementById('music-toggle-btn');
    
    if (userWantsMusic) {
        // Pause the music
        ytPlayer.pauseVideo();
        userWantsMusic = false;
        if (btn) btn.innerHTML = 'PLAY'; // Play icon indicator
    } else {
        // Start playing
        ytPlayer.playVideo();
        userWantsMusic = true;
        if (btn) btn.innerHTML = 'PAUSE'; // Pause icon indicator
    }
}
